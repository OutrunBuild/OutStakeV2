name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Gate CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Slither
        run: python3 -m pip install slither-analyzer==0.11.5

      - name: Show Forge version
        run: forge --version

      - name: Collect changed files
        id: changed-files
        shell: bash
        run: |
          set -euo pipefail
          output="${RUNNER_TEMP}/changed-files.txt"
          diff_output="${RUNNER_TEMP}/changed-files.diff"
          zero_sha="0000000000000000000000000000000000000000"
          empty_tree="4b825dc642cb6eb9a060e54bf8d69288fbee4904"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [ "$base" = "$zero_sha" ]; then
            git ls-files > "$output"
            git diff --unified=0 "$empty_tree" "$head" > "$diff_output"
          else
            git diff --name-only "$base" "$head" > "$output"
            git diff --unified=0 "$base" "$head" > "$diff_output"
          fi

          echo "file_list=$output" >> "$GITHUB_OUTPUT"
          echo "diff_file=$diff_output" >> "$GITHUB_OUTPUT"

      - name: Run gate:ci
        env:
          HARNESS_CHANGED_FILES: ${{ steps.changed-files.outputs.file_list }}
          RUN_RECORD_PATH: ${{ runner.temp }}/outstakev2-gate-ci.json
          CHANGE_CLASSIFIER_DIFF_FILE: ${{ steps.changed-files.outputs.diff_file }}
        run: npm run gate:ci -- --changed-files "$HARNESS_CHANGED_FILES"
