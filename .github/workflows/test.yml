name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  check:
    name: Gate CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          submodules: recursive
          fetch-depth: 0

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Slither
        run: python3 -m pip install slither-analyzer==0.11.5 jsonschema

      - name: Patch slither source_mapping bug
        run: |
          SITE=$(python3 -c "import slither, os; print(os.path.dirname(slither.__file__))")
          sed -i 's/contract.source_mapping.to_detailed_str()/contract.source_mapping.to_detailed_str() if contract.source_mapping else "unknown"/' \
            "$SITE/solc_parsing/expressions/find_variable.py"

      - name: Show Forge version
        run: forge --version

      - name: Run gate:ci
        env:
          HARNESS_EVENT_NAME: ${{ github.event_name }}
          HARNESS_EVENT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HARNESS_EVENT_HEAD_SHA: ${{ github.sha }}
          RUN_RECORD_PATH: ${{ runner.temp }}/outstakev2-gate-ci.json
        run: bash script/harness/ci-gate-entrypoint.sh
